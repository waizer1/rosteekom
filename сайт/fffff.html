<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Умный дом</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">🏠 Мой умный дом</h1>

  <!-- Сетка устройств -->
  <div class="devices-grid" id="devicesGrid">
    <div class="add-btn" onclick="openAddModal()">
      <span class="add-icon">+</span>
      <span>Добавить устройство</span>
    </div>
  </div>

  <!-- Модалка: добавить устройство -->
  <div class="overlay" id="addModal" onclick="closeAddModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeAddModal()">×</button>
      <h2>Добавить устройство</h2>
      <input type="text" id="searchInput" placeholder="Введите название..." oninput="searchDevice()">
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- Модалка: управление устройством -->
  <div class="overlay" id="controlModal" onclick="closeControlModal()">
    <div class="modal modal-wide" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeControlModal()">×</button>
      <div id="controlContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
